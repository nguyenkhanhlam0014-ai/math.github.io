<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoGebra V30 - Mobile Friendly</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        .sidebar { width: 260px; background: var(--panel); border-right: 2px solid #334155; display: flex; flex-direction: column; z-index: 300; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 120px; border-right: none; border-top: 2px solid #334155; order: 2; }
        }

        .sidebar-header { padding: 10px; background: #020617; font-weight: bold; color: var(--accent); text-align: center; font-size: 12px; }
        #proof-input { flex-grow: 1; background: #111827; border: none; color: #10b981; padding: 10px; font-size: 13px; outline: none; resize: none; }

        .viewport { flex-grow: 1; position: relative; background: #f8fafc; overflow: hidden; order: 1; }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            touch-action: none; /* QUAN TRỌNG CHO MOBILE: Ngăn trình duyệt can thiệp vuốt */
        }
        
        .toolbar { position: absolute; top: 10px; left: 10px; z-index: 400; display: flex; gap: 4px; background: var(--panel); padding: 6px; border-radius: 8px; flex-wrap: wrap; max-width: calc(100% - 20px); }
        .tool { padding: 8px 10px; border-radius: 4px; cursor: pointer; border: none; background: transparent; color: white; font-weight: bold; font-size: 10px; white-space: nowrap; }
        .tool.active { background: var(--accent); color: #0f172a; }
        
        .shape-menu { position: absolute; bottom: 20px; right: 10px; z-index: 400; background: var(--panel); padding: 8px; border-radius: 8px; display: flex; flex-direction: row; gap: 5px; border: 1px solid var(--accent); }
        .btn-shape { background: #334155; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        .guide { position: absolute; bottom: 80px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 6px; font-size: 9px; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">GHI CHÚ / LỜI GIẢI</div>
    <textarea id="proof-input" placeholder="Nhập lời giải tại đây..."></textarea>
</div>

<div class="viewport" id="stage">
    <div class="toolbar">
        <button class="tool active" data-mode="move">DI CHUYỂN / ZOOM</button>
        <button class="tool" data-mode="point">ĐIỂM</button>
        <button class="tool" data-mode="segment">ĐOẠN</button>
        <button class="tool" data-mode="midpoint" style="color:#fbbf24">TRUNG ĐIỂM</button>
        <button class="tool" data-mode="opposite" style="color:#fbbf24">TIA ĐỐI</button>
        <button class="tool" data-mode="altitude">CAO</button>
        <button class="tool" data-mode="eraser" style="background:#475569">GÔM</button>
        <button class="tool" style="background:#ef4444" onclick="hardReset()">RESET</button>
    </div>

    <div class="shape-menu">
        <button class="btn-shape" onclick="spawn('triangle')">▲ Tam giác</button>
        <button class="btn-shape" onclick="spawn('rectangle')">█ Hình CN</button>
    </div>

    <canvas id="main-canvas"></canvas>
    <div class="guide">1 ngón: Kéo giấy/Điểm | 2 ngón: Phóng to/Thu nhỏ | Đúp điểm: Đổi tên</div>
</div>

<script>
const stage = document.getElementById('stage');
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');

let points = [], lines = [], counter = 0;
const alphabet = "ABCDEFGHIKLMNOPQRSTUVWXYZ";

// Viewport State
let offset = { x: 0, y: 0 };
let scale = 1;
const minScale = 0.1, maxScale = 10;

// Interaction State
let mode = 'move';
let selected = [];
let dragGroup = [];
let isPanning = false;
let lastTouch = { x: 0, y: 0 };
let initialPinchDist = 0;
let initialScale = 1;

function init() {
    resize();
    window.addEventListener('resize', resize);
    setupTouch();
    setupMouse(); // Vẫn giữ cho PC
    requestAnimationFrame(loop);
}

function resize() {
    canvas.width = stage.offsetWidth;
    canvas.height = stage.offsetHeight;
}

function screenToWorld(sX, sY) {
    return { x: (sX - offset.x) / scale, y: (sY - offset.y) / scale };
}

// --- HỆ THỐNG TOUCH MỚI (MƯỢT HƠN) ---
function setupTouch() {
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const touches = e.touches;

        if (touches.length === 1) {
            // Xử lý 1 ngón: Kéo điểm hoặc Pan
            const rect = canvas.getBoundingClientRect();
            const sX = touches[0].clientX - rect.left;
            const sY = touches[0].clientY - rect.top;
            lastTouch = { x: sX, y: sY };

            const hitPt = findHitPoint(sX, sY);
            if (mode === 'move') {
                if (hitPt) {
                    dragGroup = [hitPt];
                    isPanning = false;
                } else {
                    isPanning = true; // Chạm chỗ trống -> Pan
                }
            } else {
                handleAction(sX, sY, hitPt);
            }
        } else if (touches.length === 2) {
            // Xử lý 2 ngón: Zoom
            isPanning = false;
            dragGroup = [];
            initialPinchDist = Math.hypot(
                touches[0].clientX - touches[1].clientX,
                touches[0].clientY - touches[1].clientY
            );
            initialScale = scale;
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const touches = e.touches;
        const rect = canvas.getBoundingClientRect();

        if (touches.length === 1) {
            const sX = touches[0].clientX - rect.left;
            const sY = touches[0].clientY - rect.top;
            const dx = sX - lastTouch.x;
            const dy = sY - lastTouch.y;

            if (isPanning) {
                offset.x += dx;
                offset.y += dy;
            } else if (dragGroup.length > 0) {
                dragGroup.forEach(p => { if(p.type==='basic'){ p.x += dx/scale; p.y += dy/scale; }});
            }
            lastTouch = { x: sX, y: sY };
        } else if (touches.length === 2) {
            // Pinch to Zoom
            const currentDist = Math.hypot(
                touches[0].clientX - touches[1].clientX,
                touches[0].clientY - touches[1].clientY
            );
            const pCenterX = (touches[0].clientX + touches[1].clientX) / 2 - rect.left;
            const pCenterY = (touches[0].clientY + touches[1].clientY) / 2 - rect.top;
            
            const wP = screenToWorld(pCenterX, pCenterY);
            const zoomFactor = currentDist / initialPinchDist;
            
            scale = Math.max(minScale, Math.min(maxScale, initialScale * zoomFactor));
            offset.x = pCenterX - wP.x * scale;
            offset.y = pCenterY - wP.y * scale;
        }
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
        // QUAN TRỌNG: Reset khi nhấc tay để lần sau kéo tiếp được
        if (e.touches.length === 0) {
            isPanning = false;
            dragGroup = [];
        } else if (e.touches.length === 1) {
            // Nếu còn 1 ngón, cập nhật lại vị trí ngón đó để tránh bị nhảy hình
            const rect = canvas.getBoundingClientRect();
            lastTouch = { 
                x: e.touches[0].clientX - rect.left, 
                y: e.touches[0].clientY - rect.top 
            };
        }
    });
}

// Các hàm bổ trợ
function findHitPoint(sX, sY) {
    const wP = screenToWorld(sX, sY);
    const threshold = 25 / scale; // Vùng chạm lớn cho mobile
    return points.find(p => Math.hypot(p.x - wP.x, p.y - wP.y) < threshold);
}

function handleAction(sX, sY, hitPt) {
    const wP = screenToWorld(sX, sY);
    if (mode === 'point' && !hitPt) {
        points.push({id:Date.now(), x:wP.x, y:wP.y, name: alphabet[counter++] || 'P'+counter, type: 'basic'});
        return;
    }
    // Logic cho Eraser/Dựng hình tương tự bản cũ...
    // (Bạn có thể copy lại phần logic applyGeometryLogic của mình ở trên)
}

// Đừng quên hàm render() và loop() từ bản trước để vẽ lên canvas
// ... (giữ nguyên render, updateDependentPoints, loop)
</script>
</body>
</html>
