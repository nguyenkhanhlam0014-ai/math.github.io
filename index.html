<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN V44 - NO ZOOM PRECISION</title>
    <style>
        :root { --primary: #2563eb; --accent: #fbbf24; --bg: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; -webkit-user-select: none; }
        body { font-family: system-ui, sans-serif; background: var(--bg); height: 100vh; overflow: hidden; display: flex; }
        
        /* Sidebar giữ nguyên giao diện Lâm thích */
        .sidebar { width: 70px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 15px 0; z-index: 100; }
        .tool-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; width: 100%; align-items: center; }
        .btn { width: 48px; height: 48px; border-radius: 12px; border: 1px solid transparent; background: #f1f5f9; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; color: #64748b; }
        .btn.active { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn i { font-style: normal; font-size: 18px; }
        .btn span { font-size: 7px; font-weight: 800; margin-top: 3px; text-transform: uppercase; }

        .viewport { flex-grow: 1; position: relative; background: #fff; }
        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }

        .hud { position: absolute; top: 15px; left: 20px; pointer-events: none; }
        .hud h1 { font-size: 14px; font-weight: 900; color: var(--primary); background: rgba(255,255,255,0.8); padding: 5px 10px; border-radius: 8px; }
        .status { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 12px; pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="tool-group">
        <button class="btn active" data-mode="MOVE"><i>🖱️</i><span>Dời</span></button>
        <button class="btn" data-mode="POINT"><i>📍</i><span>Điểm</span></button>
    </div>
    <div class="tool-group">
        <button class="btn" data-mode="SEGMENT"><i>📏</i><span>Đoạn</span></button>
        <button class="btn" data-mode="RAY"><i>↗️</i><span>Tia</span></button>
        <button class="btn" data-mode="OPP_RAY"><i>⬅️</i><span>Tia Đối</span></button>
    </div>
    <div class="tool-group">
        <button class="btn" data-mode="MID"><i>½</i><span>Trung</span></button>
        <button class="btn" data-mode="BISECT"><i>∠</i><span>P.Giác</span></button>
        <button class="btn" data-mode="ALT"><i>⊥</i><span>V.Góc</span></button>
    </div>
    <button class="btn" onclick="location.reload()" style="margin-top:auto; color:#ef4444"><i>♻️</i><span>Reset</span></button>
</aside>

<main class="viewport">
    <canvas id="canvas"></canvas>
    <div class="hud"><h1 id="mode-ui">CHẾ ĐỘ: DI CHUYỂN</h1></div>
    <div class="status" id="status-ui">Hệ thống đã tắt Zoom - Độ chính xác 100%</div>
</main>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let state = {
    mode: 'MOVE',
    objects: [],
    selected: [],
    drag: { target: null },
    alphabet: "ABCDEFGHIKLMNOPQRSTUVWXYZ",
    pIdx: 0
};

// --- HÌNH HỌC (Tọa độ phẳng 1:1) ---
const getObj = (id) => state.objects.find(o => o.id === id);

function solve() {
    const sel = state.selected;
    const mode = state.mode;

    if (sel.length === 2) {
        if (mode === 'SEGMENT') state.objects.push({ type: 'line', sub: 'seg', pIds: [...sel], color: '#334155' });
        if (mode === 'RAY') state.objects.push({ type: 'line', sub: 'ray', pIds: [...sel], color: '#334155' });
        if (mode === 'OPP_RAY') state.objects.push({ type: 'line', sub: 'opp', pIds: [...sel], color: '#db2777' });
        if (mode === 'MID') {
            const mId = 'p' + Math.random();
            state.objects.push({ id: mId, type: 'point', sub: 'mid', pIds: [...sel], name: 'M' + (state.pIdx++) });
            state.objects.push({ type: 'mark', sub: 'tick', pIds: [sel[0], mId] });
            state.objects.push({ type: 'mark', sub: 'tick', pIds: [mId, sel[1]] });
        }
        if (['SEGMENT','RAY','OPP_RAY','MID'].includes(mode)) state.selected = [];
    }

    if (sel.length === 3) {
        if (mode === 'BISECT') {
            const bId = 'b' + Math.random();
            state.objects.push({ id: bId, type: 'point', sub: 'bisect', pIds: [...sel], name: '' });
            state.objects.push({ type: 'line', sub: 'ray', pIds: [sel[1], bId], color: '#10b981', dash: [5, 5] });
        }
        if (mode === 'ALT') {
            const hId = 'h' + Math.random();
            state.objects.push({ id: hId, type: 'point', sub: 'alt', pIds: [...sel], name: 'H' + (state.pIdx++) });
            state.objects.push({ type: 'line', sub: 'seg', pIds: [sel[0], hId], color: '#ef4444' });
            state.objects.push({ type: 'mark', sub: 'right', pIds: [sel[0], hId, sel[1]] });
        }
        state.selected = [];
    }
    updateUI();
}

function updatePhysics() {
    state.objects.forEach(o => {
        if (o.type === 'point') {
            const pts = o.pIds ? o.pIds.map(getObj) : [];
            if (o.sub === 'mid' && pts[0] && pts[1]) { o.x = (pts[0].x+pts[1].x)/2; o.y = (pts[0].y+pts[1].y)/2; }
            if (o.sub === 'alt' && pts[0] && pts[1] && pts[2]) {
                const [p, a, b] = pts; const dx = b.x-a.x, dy = b.y-a.y;
                const t = ((p.x-a.x)*dx + (p.y-a.y)*dy) / (dx*dx+dy*dy || 1);
                o.x = a.x + t*dx; o.y = a.y + t*dy;
            }
            if (o.sub === 'bisect' && pts[0] && pts[1] && pts[2]) {
                const [p1, v, p2] = pts;
                const a1 = Math.atan2(p1.y-v.y, p1.x-v.x), a2 = Math.atan2(p2.y-v.y, p2.x-v.x);
                let a = (a1+a2)/2; if(Math.abs(a1-a2)>Math.PI) a+=Math.PI;
                o.x = v.x + Math.cos(a)*50; o.y = v.y + Math.sin(a)*50;
            }
        }
    });
}

function render() {
    updatePhysics();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Grid tĩnh
    ctx.beginPath(); ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 1;
    for(let x=0; x<canvas.width; x+=40) { ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); }
    for(let y=0; y<canvas.height; y+=40) { ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); }
    ctx.stroke();

    // Lines
    state.objects.filter(o => o.type === 'line').forEach(l => {
        const p1 = getObj(l.pIds[0]), p2 = getObj(l.pIds[1]);
        if (!p1 || !p2) return;
        ctx.beginPath(); ctx.strokeStyle = l.color; ctx.lineWidth = 2.5;
        ctx.setLineDash(l.dash || []);
        ctx.moveTo(p1.x, p1.y);
        if (l.sub === 'seg') ctx.lineTo(p2.x, p2.y);
        else { 
            let ang = Math.atan2(p2.y-p1.y, p2.x-p1.x);
            if (l.sub === 'opp') ang += Math.PI;
            ctx.lineTo(p1.x + Math.cos(ang)*3000, p1.y + Math.sin(ang)*3000); 
        }
        ctx.stroke();
    });

    // Marks (Tick & Right Angle)
    state.objects.filter(o => o.type === 'mark').forEach(m => {
        const pts = m.pIds.map(getObj);
        if (m.sub === 'tick' && pts[0] && pts[1]) {
            const mx = (pts[0].x+pts[1].x)/2, my = (pts[0].y+pts[1].y)/2;
            const ang = Math.atan2(pts[1].y-pts[0].y, pts[1].x-pts[0].x) + Math.PI/2;
            ctx.beginPath(); ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2;
            for(let i of [-2, 2]) {
                ctx.moveTo(mx+Math.cos(ang)*7+i, my+Math.sin(ang)*7+i);
                ctx.lineTo(mx-Math.cos(ang)*7+i, my-Math.sin(ang)*7+i);
            }
            ctx.stroke();
        } else if (m.sub === 'right' && pts[0] && pts[1] && pts[2]) {
            const h = pts[1];
            const a1 = Math.atan2(pts[0].y-h.y, pts[0].x-h.x), a2 = Math.atan2(pts[2].y-h.y, pts[2].x-h.x);
            const sz = 15; ctx.beginPath(); ctx.strokeStyle = '#ef4444';
            const v1 = { x: h.x+Math.cos(a1)*sz, y: h.y+Math.sin(a1)*sz };
            const v3 = { x: h.x+Math.cos(a2)*sz, y: h.y+Math.sin(a2)*sz };
            const v2 = { x: v1.x+Math.cos(a2)*sz, y: v1.y+Math.sin(a2)*sz };
            ctx.moveTo(v1.x, v1.y); ctx.lineTo(v2.x, v2.y); ctx.lineTo(v3.x, v3.y); ctx.stroke();
        }
    });

    // Points
    state.objects.filter(o => o.type === 'point').forEach(p => {
        if (p.name === '' && p.sub === 'bisect') return;
        const isSel = state.selected.includes(p.id);
        ctx.beginPath(); ctx.arc(p.x, p.y, isSel ? 8 : 5, 0, Math.PI*2);
        ctx.fillStyle = isSel ? '#fbbf24' : (p.sub === 'free' ? '#1e293b' : '#ef4444');
        ctx.fill(); ctx.strokeStyle = isSel ? '#2563eb' : '#fff'; ctx.lineWidth = 2; ctx.stroke();
        if (p.name) { ctx.fillStyle = '#1e293b'; ctx.font = 'bold 14px sans-serif'; ctx.fillText(p.name, p.x+12, p.y-12); }
    });

    requestAnimationFrame(render);
}

// --- INPUTS (Hệ phẳng 1:1) ---
canvas.addEventListener('pointerdown', e => {
    const x = e.clientX - canvas.getBoundingClientRect().left;
    const y = e.clientY - canvas.getBoundingClientRect().top;
    
    // Tìm điểm gần nhất trong bán kính 30px
    const hit = state.objects.find(o => o.type === 'point' && Math.hypot(o.x - x, o.y - y) < 30);

    if (state.mode === 'MOVE') {
        if (hit && hit.sub === 'free') state.drag.target = hit;
    } else if (state.mode === 'POINT') {
        if (!hit) state.objects.push({ id: 'p'+Date.now(), type: 'point', sub: 'free', x, y, name: state.alphabet[state.pIdx++%26] });
    } else {
        if (hit && !state.selected.includes(hit.id)) {
            state.selected.push(hit.id);
            solve();
        }
    }
    updateUI();
});

window.addEventListener('pointermove', e => {
    if (state.drag.target) {
        state.drag.target.x = e.clientX - canvas.getBoundingClientRect().left;
        state.drag.target.y = e.clientY - canvas.getBoundingClientRect().top;
    }
});

window.addEventListener('pointerup', () => state.drag.target = null);

function updateUI() {
    document.getElementById('mode-ui').innerText = 'CHẾ ĐỘ: ' + state.mode;
    document.getElementById('status-ui').innerText = `Đã chọn: ${state.selected.length} điểm | Tọa độ chuẩn 1:1`;
}

document.querySelectorAll('.btn[data-mode]').forEach(b => {
    b.onclick = () => {
        state.mode = b.dataset.mode; state.selected = [];
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active'); updateUI();
    };
});

window.onresize = () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; };
window.onload = () => { window.onresize(); render(); };
</script>
</body>
</html>
