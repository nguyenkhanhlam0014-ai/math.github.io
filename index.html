<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoGebra V30 - Mobile Friendly</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Sidebar tự thích ứng: Ở bên trái trên PC, ở dưới trên Mobile */
        .sidebar { width: 260px; background: var(--panel); border-right: 2px solid #334155; display: flex; flex-direction: column; z-index: 300; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 120px; border-right: none; border-top: 2px solid #334155; order: 2; }
        }

        .sidebar-header { padding: 10px; background: #020617; font-weight: bold; color: var(--accent); text-align: center; font-size: 12px; }
        #proof-input { flex-grow: 1; background: #111827; border: none; color: #10b981; padding: 10px; font-size: 13px; outline: none; resize: none; }

        .viewport { flex-grow: 1; position: relative; background: #f8fafc; overflow: hidden; order: 1; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Toolbar tự xuống dòng khi màn hình hẹp */
        .toolbar { position: absolute; top: 10px; left: 10px; z-index: 400; display: flex; gap: 4px; background: var(--panel); padding: 6px; border-radius: 8px; flex-wrap: wrap; max-width: calc(100% - 20px); }
        .tool { padding: 8px 10px; border-radius: 4px; cursor: pointer; border: none; background: transparent; color: white; font-weight: bold; font-size: 10px; white-space: nowrap; }
        .tool.active { background: var(--accent); color: #0f172a; }
        
        .shape-menu { position: absolute; bottom: 20px; right: 10px; z-index: 400; background: var(--panel); padding: 8px; border-radius: 8px; display: flex; flex-direction: row; gap: 5px; border: 1px solid var(--accent); }
        .btn-shape { background: #334155; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        .guide { position: absolute; bottom: 80px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 6px; font-size: 9px; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">GHI CHÚ / LỜI GIẢI</div>
    <textarea id="proof-input" placeholder="Nhập lời giải tại đây..."></textarea>
</div>

<div class="viewport" id="stage">
    <div class="toolbar">
        <button class="tool active" data-mode="move">DI CHUYỂN</button>
        <button class="tool" data-mode="point">ĐIỂM</button>
        <button class="tool" data-mode="segment">ĐOẠN</button>
        <button class="tool" data-mode="midpoint" style="color:#fbbf24">TRUNG ĐIỂM</button>
        <button class="tool" data-mode="opposite" style="color:#fbbf24">TIA ĐỐI</button>
        <button class="tool" data-mode="altitude">CAO</button>
        <button class="tool" data-mode="eraser" style="background:#475569">GÔM</button>
        <button class="tool" style="background:#ef4444" onclick="hardReset()">RESET</button>
    </div>

    <div class="shape-menu">
        <button class="btn-shape" onclick="spawn('triangle')">▲ Tam giác</button>
        <button class="btn-shape" onclick="spawn('rectangle')">█ Hình CN</button>
    </div>

    <canvas id="main-canvas"></canvas>
    <div class="guide">Nhấn đúp điểm để đổi tên | Giữ chuột phải kéo giấy</div>
</div>

<script>
    // Toàn bộ logic giữ nguyên như V29 nhưng thêm hỗ trợ Touch cơ bản
    const stage = document.getElementById('stage');
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    let points = [], lines = [], selected = [], mode = 'move';
    let isSelecting = false, selectionBox = null, dragGroup = [];
    let offset = { x: 0, y: 0 }, isPanning = false, lastMouse = { x: 0, y: 0 };
    const alphabet = "ABCDEFGHIKLMNOPQRSTUVWXYZ";
    let counter = 0;

    function init() {
        canvas.width = stage.offsetWidth; canvas.height = stage.offsetHeight;
        requestAnimationFrame(loop);
    }

    function hardReset() {
        points.length = 0; lines.length = 0; selected.length = 0; dragGroup.length = 0;
        counter = 0; offset.x = 0; offset.y = 0;
        document.getElementById('proof-input').value = "";
    }

    function loop() {
        points.forEach(p => {
            if (p.type === 'mid') {
                const p1 = points.find(pt => pt.id === p.parents[0]), p2 = points.find(pt => pt.id === p.parents[1]);
                if (p1 && p2) { p.x = (p1.x + p2.x) / 2; p.y = (p1.y + p2.y) / 2; }
            } else if (p.type === 'opp') {
                const b = points.find(pt => pt.id === p.parents[0]), a = points.find(pt => pt.id === p.parents[1]);
                if (b && a) { p.x = a.x + (a.x - b.x); p.y = a.y + (a.y - b.y); }
            } else if (p.type === 'foot') {
                const t = points.find(pt => pt.id === p.ref.topId), b1 = points.find(pt => pt.id === p.ref.b1Id), b2 = points.find(pt => pt.id === p.ref.b2Id);
                if (t && b1 && b2) {
                    const dx = b2.x - b1.x, dy = b2.y - b1.y, l2 = dx*dx + dy*dy;
                    if(l2 > 0) {
                        let k = Math.max(0, Math.min(1, ((t.x - b1.x) * dx + (t.y - b1.y) * dy) / l2));
                        p.x = b1.x + k * dx; p.y = b1.y + k * dy;
                    }
                }
            }
        });
        render();
        requestAnimationFrame(loop);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offset.x, offset.y);
        ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 0.5;
        const sX = -offset.x - ((-offset.x) % 40), sY = -offset.y - ((-offset.y) % 40);
        for(let x=sX; x < canvas.width - offset.x; x+=40) { ctx.beginPath(); ctx.moveTo(x, -offset.y); ctx.lineTo(x, canvas.height - offset.y); ctx.stroke(); }
        for(let y=sY; y < canvas.height - offset.y; y+=40) { ctx.beginPath(); ctx.moveTo(-offset.x, y); ctx.lineTo(canvas.width - offset.x, y); ctx.stroke(); }
        lines.forEach(l => {
            const p1 = points.find(p => p.id === l.p1Id), p2 = points.find(p => p.id === (l.footId || l.p2Id));
            if (!p1 || !p2) return;
            ctx.setLineDash(l.type === 'altitude' ? [6, 4] : []);
            ctx.strokeStyle = (selected.includes(l)) ? "#f97316" : (l.type === 'altitude' ? "#8b5cf6" : "#2563eb");
            ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            if(l.mark) drawTicks(ctx, p1, p2, l.mark);
            if(l.type === 'altitude') {
                const b1 = points.find(p => p.id === l.ref.b1Id), b2 = points.find(p => p.id === l.ref.b2Id);
                if (b1 && b2) drawSquare(ctx, p1, p2, b1, b2);
            }
        });
        points.forEach(p => {
            const h = dragGroup.includes(p) || selected.includes(p);
            ctx.fillStyle = h ? "#f59e0b" : (p.type === 'basic' ? "#2563eb" : "#ef4444");
            ctx.beginPath(); ctx.arc(p.x, p.y, h ? 8 : 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#1e293b"; ctx.font = "bold 13px Arial";
            ctx.fillText(p.name, p.x + 10, p.y - 10);
        });
        ctx.restore();
        if (isSelecting && selectionBox) {
            ctx.fillStyle = "rgba(56, 189, 248, 0.15)";
            ctx.strokeRect(selectionBox.x, selectionBox.y, selectionBox.w, selectionBox.h);
        }
    }

    function drawTicks(c, p1, p2, count) {
        const mx = (p1.x + p2.x)/2, my = (p1.y + p2.y)/2, dx = p2.x - p1.x, dy = p2.y - p1.y, dist = Math.hypot(dx, dy);
        const nx = -dy/dist * 6, ny = dx/dist * 6;
        c.setLineDash([]); c.strokeStyle = "#22c55e"; c.lineWidth = 2;
        for(let i=0; i<count; i++) {
            const s = (i - (count-1)/2) * 4;
            c.beginPath(); c.moveTo(mx-nx + (dx/dist)*s, my-ny + (dy/dist)*s); 
            c.lineTo(mx+nx + (dx/dist)*s, my+ny + (dy/dist)*s); c.stroke();
        }
    }

    function drawSquare(c, p, h, b1, b2) {
        const s = 10, d1 = Math.hypot(b1.x-b2.x, b1.y-b2.y), d2 = Math.hypot(p.x-h.x, p.y-h.y);
        if(d1 === 0 || d2 === 0) return;
        const ux = (b1.x-b2.x)/d1, uy = (b1.y-b2.y)/d1, vx = (p.x-h.x)/d2, vy = (p.y-h.y)/d2;
        c.setLineDash([]); c.strokeStyle = "#ef4444"; c.beginPath();
        c.moveTo(h.x + ux*s, h.y + uy*s); c.lineTo(h.x + ux*s + vx*s, h.y + uy*s + vy*s);
        c.lineTo(h.x + vx*s, h.y + vy*s); c.stroke();
    }

    stage.onmousedown = e => {
        const x = e.offsetX - offset.x, y = e.offsetY - offset.y;
        lastMouse = { x: e.offsetX, y: e.offsetY };
        if (e.button === 2) { isPanning = true; return; }
        const hitPt = points.find(p => Math.hypot(p.x - x, p.y - y) < 15);
        const hitLn = lines.find(l => {
            const p1 = points.find(p => p.id === l.p1Id), p2 = points.find(p => p.id === (l.footId || l.p2Id));
            if(!p1 || !p2) return false;
            const d = Math.hypot(p1.x-p2.x, p1.y-p2.y);
            return (Math.abs((p2.y-p1.y)*x - (p2.x-p1.x)*y + p2.x*p1.y - p2.y*p1.x) / d) < 10;
        });
        if (mode === 'eraser') {
            if (hitPt) points.splice(points.indexOf(hitPt), 1);
            else if (hitLn) lines.splice(lines.indexOf(hitLn), 1);
            return;
        }
        if (mode === 'move') {
            if (hitPt) dragGroup = [hitPt];
            else { isSelecting = true; selectionBox = {x: e.offsetX, y: e.offsetY, w:0, h:0}; dragGroup = []; }
        } else {
            if (mode === 'point' && !hitPt) points.push({id:Date.now(), x, y, name: alphabet[counter++] || 'P'+counter, type: 'basic'});
            const hit = hitPt || hitLn;
            if (hit) {
                selected.push(hit);
                if (selected.length === 2) {
                    const [p1, p2] = selected;
                    if (mode === 'segment') lines.push({id:Date.now(), p1Id: p1.id, p2Id: p2.id, type: 'basic'});
                    if (mode === 'midpoint') {
                        const mId = Date.now(); points.push({id: mId, x:0, y:0, name: 'M'+(++counter), type: 'mid', parents: [p1.id, p2.id]});
                        lines.push({p1Id: p1.id, p2Id: mId, mark: 1}); lines.push({p1Id: mId, p2Id: p2.id, mark: 1});
                    }
                    if (mode === 'opposite') {
                        const dId = Date.now(); points.push({id: dId, x:0, y:0, name: 'D'+(++counter), type: 'opp', parents: [p1.id, p2.id]});
                        lines.push({p1Id: p1.id, p2Id: p2.id, mark: 2}); lines.push({p1Id: p2.id, p2Id: dId, mark: 2});
                    }
                    if (mode === 'altitude' && p2.p1Id) {
                        const fId = Date.now(); points.push({id: fId, x:0, y:0, name: 'H'+(++counter), type: 'foot', ref: {topId: p1.id, b1Id: p2.p1Id, b2Id: p2.p2Id}});
                        lines.push({type: 'altitude', p1Id: p1.id, footId: fId, ref: {b1Id: p2.p1Id, b2Id: p2.p2Id}});
                    }
                    selected.length = 0;
                }
            }
        }
    };

    stage.ondblclick = e => {
        const x = e.offsetX - offset.x, y = e.offsetY - offset.y;
        const hitPt = points.find(p => Math.hypot(p.x - x, p.y - y) < 15);
        if (hitPt) { const n = prompt("Tên mới:", hitPt.name); if(n) hitPt.name = n.toUpperCase(); }
    };

    stage.onmousemove = e => {
        if (isPanning) { offset.x += e.offsetX - lastMouse.x; offset.y += e.offsetY - lastMouse.y; lastMouse = { x: e.offsetX, y: e.offsetY }; return; }
        if (isSelecting) {
            selectionBox.w = e.offsetX - selectionBox.x; selectionBox.h = e.offsetY - selectionBox.y;
            const xMin = Math.min(selectionBox.x, e.offsetX)-offset.x, xMax = Math.max(selectionBox.x, e.offsetX)-offset.x;
            const yMin = Math.min(selectionBox.y, e.offsetY)-offset.y, yMax = Math.max(selectionBox.y, e.offsetY)-offset.y;
            dragGroup = points.filter(p => p.x > xMin && p.x < xMax && p.y > yMin && p.y < yMax);
        } else if (dragGroup.length > 0) {
            const dx = e.offsetX - lastMouse.x, dy = e.offsetY - lastMouse.y;
            dragGroup.forEach(p => { if(p.type === 'basic') { p.x += dx; p.y += dy; } });
            lastMouse = { x: e.offsetX, y: e.offsetY };
        }
    };

    window.onmouseup = () => { isSelecting = false; selectionBox = null; isPanning = false; if(dragGroup.length === 1) dragGroup.length = 0; };
    stage.oncontextmenu = e => e.preventDefault();

    function spawn(type) {
        const cx = 150-offset.x, cy = 200-offset.y, s = 60;
        let pts = type === 'triangle' ? [{x:cx, y:cy-s}, {x:cx-s, y:cy+s}, {x:cx+s, y:cy+s}] : [{x:cx-s, y:cy-s/2}, {x:cx+s, y:cy-s/2}, {x:cx+s, y:cy+s/2}, {x:cx-s, y:cy+s/2}];
        const newPs = pts.map(p => { const pt = {id:Math.random(), x:p.x, y:p.y, name:alphabet[counter++]||'P'+counter, type:'basic'}; points.push(pt); return pt; });
        for(let i=0; i<newPs.length; i++) lines.push({p1Id:newPs[i].id, p2Id:newPs[(i+1)%newPs.length].id, type:'basic'});
    }

    document.querySelectorAll('.tool').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
            btn.classList.add('active'); mode = btn.dataset.mode;
            selected.length = 0; dragGroup.length = 0;
        };
    });
    window.onload = init;
</script>
</body>
</html>
